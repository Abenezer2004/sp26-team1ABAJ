<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Profile - Nurse Search</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="container navbar-content">
            <div class="logo">
                Nurse Search
            </div>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="search.html">Find Nurses</a></li>
                <li><a href="dashboard.html">My Bookings</a></li>
                <li><a href="profile.html" class="active">Profile</a></li>
            </ul>
        </div>
    </nav>
    <div class="container" style="max-width: 900px; margin: 32px auto;">
    <h1 style="margin-bottom: 32px;">My Profile</h1>

    <div style="display: grid; gap: 24px;">
      <!-- Personal Information -->
      <div class="card">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
          <h2 style="margin: 0;">Personal Information</h2>
          <button class="btn btn-secondary btn-small" onclick="toggleEdit('personal')">Edit</button>
        </div>

        <form id="personalForm">
          <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
            <div class="form-group">
              <label for="firstName">First Name</label>
              <input type="text" id="firstName" value="Abenezer" disabled>
            </div>
            <div class="form-group">
              <label for="lastName">Last Name</label>
              <input type="text" id="lastName" value="Shewa" disabled>
            </div>
          </div>

          <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" value="abenezer.shewa@example.com" disabled>
          </div>

          <div class="form-group">
            <label for="phone">Phone Number</label>
            <input type="tel" id="phone" value="(111) 123-4567" disabled>
          </div>

          <div class="form-group">
            <label for="address">Address</label>
            <input type="text" id="address" value="123 Main Street, Greensboro, NC 00000" disabled>
          </div>

          <div id="personalButtons" style="display: none; gap: 12px; margin-top: 16px;">
            <button type="submit" class="btn btn-primary">Save Changes</button>
            <button type="button" class="btn btn-secondary" onclick="cancelEdit('personal')">Cancel</button>
          </div>
        </form>
      </div>

      <!-- Preferences -->
      <div class="card">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
          <h2 style="margin: 0;">Care Preferences</h2>
          <button class="btn btn-secondary btn-small" onclick="toggleEdit('preferences')">Edit</button>
        </div>

        <form id="preferencesForm">
          <div class="form-group">
            <label for="preferredLanguage">Preferred Language</label>
            <select id="preferredLanguage" disabled>
              <option selected>English</option>
              <option>Spanish</option>
              <option>French</option>
              <option>Mandarin</option>
              <option>Amharic</option>
            </select>
          </div>

          <div class="form-group">
            <label>Preferred Specialties</label>
            <div style="display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px;">
              <label class="checkbox-label" style="background: var(--gray-100); padding: 8px 16px; border-radius: var(--radius-full); pointer-events: none;">
                <input type="checkbox" checked disabled>
                <span>Post Operations Care</span>
              </label>
              <label class="checkbox-label" style="background: var(--gray-100); padding: 8px 16px; border-radius: var(--radius-full); pointer-events: none;">
                <input type="checkbox" disabled>
                <span>Wound Care</span>
              </label>
              <label class="checkbox-label" style="background: var(--gray-100); padding: 8px 16px; border-radius: var(--radius-full); pointer-events: none;">
                <input type="checkbox" checked disabled>
                <span>Medication Management</span>
              </label>
            </div>
          </div>

          

          <div id="preferencesButtons" style="display: none; gap: 12px; margin-top: 16px;">
            <button type="submit" class="btn btn-primary">Save Changes</button>
            <button type="button" class="btn btn-secondary" onclick="cancelEdit('preferences')">Cancel</button>
          </div>
        </form>
      </div>

     

      

      <!-- Account Settings -->
      <div class="card">
        <h2 style="margin-bottom: 24px;">Account Settings</h2>
        <div style="display: flex; flex-direction: column; gap: 16px;">
          <button class="btn btn-secondary" style="justify-content: flex-start;">
             Notification Preferences
          </button>
          <button class="btn btn-secondary" style="justify-content: flex-start;">
             Change Password
          </button>
          <button class="btn btn-secondary" style="justify-content: flex-start;">
             Payment Methods
          </button>
          <button class="btn btn-secondary" style="justify-content: flex-start; color: var(--accent-red);">
             Delete Account
          </button>
        </div>
      </div>
    </div>
  </div>

  <script>
    function toggleEdit(section) {
      const form = document.getElementById(section + 'Form');
      const inputs = form.querySelectorAll('input, select');
      const buttons = document.getElementById(section + 'Buttons');
      const checkboxLabels = form.querySelectorAll('.checkbox-label');
      
      inputs.forEach(input => {
        input.disabled = !input.disabled;
      });
      
      checkboxLabels.forEach(label => {
        if (label.style.pointerEvents === 'none') {
          label.style.pointerEvents = 'auto';
        } else {
          label.style.pointerEvents = 'none';
        }
      });
      
      if (buttons.style.display === 'none') {
        buttons.style.display = 'flex';
      } else {
        buttons.style.display = 'none';
      }
    }

    function cancelEdit(section) {
      toggleEdit(section);
      // In a real app, this would revert changes
    }

    document.getElementById('personalForm').addEventListener('submit', function(e) {
      e.preventDefault();
      alert('Personal information updated successfully!');
      toggleEdit('personal');
    });

    document.getElementById('preferencesForm').addEventListener('submit', function(e) {
      e.preventDefault();
      alert('Preferences updated successfully!');
      toggleEdit('preferences');
    });
  </script>
</body>
</html>
