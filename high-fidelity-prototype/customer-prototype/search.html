<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Find Nurses - Nurse Search</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .layout {
            display: grid;
            grid-template-columns: 280px 1fr;
            gap: 24px;
            margin: 32px 0;
        }
        @media (max-width: 968px) {
            .layout {
                grid-template-columns: 1fr;
            }
            .filters-sidebar {
                order: 2;
            }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="container navbar-content">
            <div class="logo">
                Nurse Search
            </div>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="search.html" class="active">Find Nurses</a></li>
                <li><a href="dashboard.html">My Bookings</a></li>
                <li><a href="profile.html">Profile</a></li>
            </ul>
        </div>
    </nav>

    <div class="container">
        <div class="search-container">
            <div class="search-bar">
                <div class="search-field" style="flex: 2;">
                    <label>Search by name or specialty</label>
                    <input type="text" placeholder="Sarah John" id="searchInput">
                </div>
                <div class="search-field">
                    <label>Location</label>
                    <input type="text" placeholder="Enter zip code" value="00000">
                </div>
                <button class="btn btn-primary" onclick="filterNurses()">Search</button>
            </div>
        </div>

        <div class="layout">
            <aside class="filters-sidebar">
                <h3 style="margin-bottom: 24px;">Filters</h3>
        
                <div class="filter-section">
                    <h4>Specialty</h4>
                    <div class="checkbox-group">
                        <label class="checkbox-label">
                            <input type="checkbox" class="specialty-filter" value="geriatric">
                            <span>Post operation  Care</span>
                        </label>
                        <label class="checkbox-label">
                            <input type="checkbox" class="specialty-filter" value="wound">
                            <span>Wound Care</span>
                        </label>
                        <label class="checkbox-label">
                            <input type="checkbox" class="specialty-filter" value="medication">
                            <span>Medication Management</span>
                        </label>
                        <label class="checkbox-label">
                            <input type="checkbox" class="specialty-filter" value="rehab">
                            <span>Rehabilitation</span>
                        </label>
                        <label class="checkbox-label">
                            <input type="checkbox" class="specialty-filter" value="palliative">
                            <span>Palliative Care</span>
                        </label>
                    </div>
                </div>

                <div class="filter-section">
                    <h4>Language</h4>
                    <div class="checkbox-group">
                        <label class="checkbox-label">
                            <input type="checkbox" class="language-filter" value="english">
                            <span>English</span>
                        </label>
                        <label class="checkbox-label">
                            <input type="checkbox" class="language-filter" value="spanish">
                            <span>Spanish</span>
                        </label>
                        <label class="checkbox-label">
                            <input type="checkbox" class="language-filter" value="french">
                            <span>French</span>
                        </label>
                        <label class="checkbox-label">
                            <input type="checkbox" class="language-filter" value="mandarin">
                            <span>Mandarin</span>
                        </label>
                        <label class="checkbox-label">
                            <input type="checkbox" class="language-filter" value="amharic">
                            <span>Amharic</span>
                        </label>
                    </div>
                </div>

                <div class="filter-section">
                    <h4>Hourly Rate</h4>
                    <div class="range-slider">
                        <input type="range" min="20" max="80" value="50" id="rateSlider">
                        <div class="range-value">Up to $<span id="rateValue">50</span>/hr</div>
                    </div>
                </div>

                <div class="filter-section">
                    <h4>Experience</h4>
                    <div class="checkbox-group">
                        <label class="checkbox-label">
                            <input type="checkbox" class="experience-filter" value="1-3">
                            <span>1-3 years</span>
                        </label>
                        <label class="checkbox-label">
                            <input type="checkbox" class="experience-filter" value="3-5">
                            <span>3-5 years</span>
                        </label>
                        <label class="checkbox-label">
                            <input type="checkbox" class="experience-filter" value="5+">
                            <span>5-10 years</span>
                        </label>
                            <label class="checkbox-label">
                                <input type="checkbox" class="experience-filter" value="10+">
                            <span>10 plus years</span>
                        </label>
                    </div>
                </div>

                <button class="btn btn-secondary btn-full" onclick="clearFilters()">Clear All Filters</button>
            </aside>

            <main>
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
                    <h2 id="resultsCount"> Nurses Available</h2>
                    <select style="padding: 8px 16px; border: 1px solid var(--gray-300); border-radius: 8px;">
                        <option>Sort by: Recommended</option>
                        <option>Highest Rated</option>
                        <option>Lowest Price</option>
                        <option>Most Experience</option>
                    </select>
                </div>

                <div class="grid grid-2" id="nurseResults">
                    <div class="nurse-card" onclick="window.location.href='nurse-profile.html'">
                        <div class="nurse-card-header">
                            <div class="nurse-avatar">SJ</div>
                            <div class="nurse-info">
                                <h3>Sarah John</h3>
                                <div class="nurse-specialty">Post Operations Care Specialist</div>
                            </div>
                        </div>
                        <div class="nurse-card-body">
                            <div class="nurse-stats">
                                <div class="rating">
                                    <span style="font-weight: 600;">5/5</span>
                                    <span style="color: var(--gray-600); font-size: 14px;">(100)</span>
                                </div>
                                <div class="stat">
                                    <span>5 years exp.</span>
                                </div>
                            </div>
                            <div class="nurse-tags">
                                <span class="tag">English</span>
                                <span class="tag">Spanish</span>
                                <span class="tag">Alzheimer's Care </span>
                                <span class="tag">Post Operations Surgery </span>
                            </div>
                            <div class="nurse-rate">$35/hour</div>
                            <button class="btn btn-primary btn-full">View Profile</button>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script>
        const rateSlider = document.getElementById('rateSlider');
        const rateValue = document.getElementById('rateValue');
        
        rateSlider.addEventListener('input', function() {
            rateValue.textContent = this.value;
        });

        function clearFilters() {
            document.querySelectorAll('input[type="checkbox"]').forEach(cb => cb.checked = false);
            rateSlider.value = 50;
            rateValue.textContent = '50';
            document.getElementById('searchInput').value = '';
        }
    </script>
</body>

</html>
