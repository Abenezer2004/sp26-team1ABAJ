<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up - Nurse Search</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <nav class="navbar">
    <div class="container navbar-content">
      <div class="logo">
        Nurse Search
      </div>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="search.html">Find Nurses</a></li>
        <li><a href="signup.html" class="active">Sign Up</a></li>
      </ul>
    </div>
  </nav>

  <div class="container" style="max-width: 500px; margin-top: 48px; margin-bottom: 48px;">
    <div class="card">
      <h1 class="text-center">Create Your Account</h1>
      <p class="text-center" style="color: var(--gray-600); margin-bottom: 32px;">Join Nurse Search </p>
      
      <form id="signupForm">
        <div class="form-group">
          <label for="fullName">Full Name *</label>
          <input type="text" id="fullName" name="fullName" required placeholder="Abenezer Shewa">
        </div>

        <div class="form-group">
          <label for="email">Email Address *</label>
          <input type="email" id="email" name="email" required placeholder="abenezer.shewa@example.com">
        </div>

        <div class="form-group">
          <label for="phone">Phone Number *</label>
          <input type="tel" id="phone" name="phone" required placeholder="(111) 123-4567">
        </div>

        <div class="form-group">
          <label for="password">Password *</label>
          <input type="password" id="password" name="password" required placeholder="strong password">
        </div>

        <div class="form-group">
          <label for="confirmPassword">Confirm Password *</label>
          <input type="password" id="confirmPassword" name="confirmPassword" required placeholder="Re-enter your password">
        </div>

        <div class="form-group">
          <label for="preferredLanguage">Preferred Language</label>
          <select id="preferredLanguage" name="preferredLanguage">
            <option value="english">English</option>
            <option value="spanish">Spanish</option>
            <option value="french">French</option>
            <option value="mandarin">Mandarin</option>
            <option value="arabic">Amharic</option>
            <option value="other">Other</option>
          </select>
        </div>

        <button type="submit" class="btn btn-primary btn-full btn-large">Create Account</button>
      </form>

      <p class="text-center" style="margin-top: 24px; color: var(--gray-600);">
        Already have an account? <a href="login.html" style="font-weight: 600;">Log In</a>
      </p>
    </div>
  </div>

  <script>
    document.getElementById('signupForm').addEventListener('submit', function(e) {
      e.preventDefault();
      
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirmPassword').value;
      
      if (password !== confirmPassword) {
        alert('Passwords do not match!');
        return;
      }
      
    });
  </script>
</body>
</html>
